<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Next Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="card shadow p-4" style="width: 400px">
        <h3 class="mb-3 text-center">Received Data</h3>

        <!-- Display login data -->
        <div id="output" class="mb-3"></div>

        <!-- 🔍 Search section -->
        <div class="mb-3">
          <label class="form-label">Search</label>
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Enter something"
          />
        </div>

        <button
          id="searchBtn"
          class="btn btn-primary w-100 mb-2"
          onclick="goToSearch()"
        >
          Search
        </button>

        <!-- Existing buttons -->
        <div class="d-flex gap-2">
          <button class="btn btn-danger w-50" onclick="clearData()">
            Clear
          </button>
          <a href="login.html" class="btn btn-secondary w-50">Back</a>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const username = params.get("username");
      const password = params.get("password");

      const outputDiv = document.getElementById("output");

      outputDiv.innerHTML = `<strong>Username:</strong> ${username} <br>
       <strong>Password:</strong> ${password}`;

      function clearData() {
        outputDiv.innerHTML = "<span class='text-muted'>Data cleared</span>";
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
      }

      function goToSearch() {
        const query = document.getElementById("searchInput").value;

        window.location.href = `final.html?query=${encodeURIComponent(query)}`;
      }
    </script>
  </body>
</html>
